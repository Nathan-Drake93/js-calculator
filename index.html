<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calc-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <script src="calculator.js" defer></script>
</head>
<body>
    <div class="layout-container">
        <div class="calculator-body">
            <div class="calculator-display">1026546897456123</div>
            <div class="calculator-keys-grid">
                <button type="button" class="key number" style="grid-area: one" data-key="1" data-type="digit" data-map="1">1</button>
                <button type="button" class="key number" style="grid-area: two" data-key="2" data-type="digit" data-map="2">2</button>
                <button type="button" class="key number" style="grid-area: three" data-key="3" data-type="digit" data-map="3">3</button>
                <button type="button" class="key number" style="grid-area: four" data-key="4" data-type="digit" data-map="4">4</button>
                <button type="button" class="key number" style="grid-area: five" data-key="5" data-type="digit" data-map="5">5</button>
                <button type="button" class="key number" style="grid-area: six" data-key="6" data-type="digit" data-map="6">6</button>
                <button type="button" class="key number" style="grid-area: seven" data-key="7" data-type="digit" data-map="7">7</button>
                <button type="button" class="key number" style="grid-area: eight" data-key="8" data-type="digit" data-map="8">8</button>
                <button type="button" class="key number" style="grid-area: nine" data-key="9" data-type="digit" data-map="9">9</button>
                <button type="button" class="key number" style="grid-area: zero" data-key="0" data-type="digit" data-map="0">0</button>
                <button type="button" class="key number small-btn" style="grid-area: period" data-key="decimal" data-type="decimal" data-map=".">.</button>
                <button type="button" class="key equal small-btn" style="grid-area: equal" data-key="equal" data-type="equal" data-map="= Enter">&equals;</button>
                <button type="button" class="key operator small-btn math" style="grid-area: add" data-key="add" data-type="binary-op" data-map="+">&plus;</button>
                <button type="button" class="key operator small-btn math" style="grid-area: sub" data-key="sub" data-type="binary-op" data-map="-">&minus;</button>
                <button type="button" class="key operator small-btn math" style="grid-area: mult" data-key="mult" data-type="binary-op" data-map="*">&times;</button>
                <button type="button" class="key operator small-btn math" style="grid-area: div" data-key="div" data-type="binary-op" data-map="/">&divide;</button>
                <button type="button" class="key operator small-btn math" style="grid-area: mod" data-key="mod" data-type="binary-op" data-map="%">&percnt;</button>
                <button type="button" class="key operator math" style="grid-area: pow" data-key="pow" data-type="binary-op" data-map="^">x<sup>y</sup></button>
                <button type="button" class="key operator small-btn math" style="grid-area: root" data-key="root" data-type="unary-op" data-map="r">&radic;</button>
                <button type="button" class="key operator memory" style="grid-area: mc" data-key="mc" data-type="memory">MC</button>
                <button type="button" class="key operator memory" style="grid-area: mr" data-key="mr" data-type="memory">MR</button>
                <button type="button" class="key operator memory" style="grid-area: msub" data-key="msub" data-type="memory">M&minus;</button>
                <button type="button" class="key operator memory" style="grid-area: madd" data-key="madd" data-type="memory">M&plus;</button>
                <button type="button" class="key clear system" style="grid-area: clear" data-key="clear" data-type="system" data-map="Backspace">C</button>
                <button type="button" class="key clear system" style="grid-area: aclear" data-key="aclear" data-type="system" data-map="Escape">AC</button>
                <button type="button" class="key operator sign-toggle" style="grid-area: negpos" data-key="negpos" data-type="unary-op" data-map="F9">&minus;/&plus;</button>
                <div class="blank" style="grid-area: blank"></div>
            </div>
        </div>
        <div class="footer">
            <div>Copyright&ensp;&copy;&ensp;<span id="year">2026</span></div>
            <div>|</div>
            <div class="gitHub-Info">Nathan Drake<a href="https://github.com/Nathan-Drake93"><img id="gitLogo" src="./images/gitHubLogo.svg" alt="git Logo"></a></div>
        </div>
    </div>
</body>
</html>
